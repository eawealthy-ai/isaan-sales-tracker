<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>โปรอีสาน ซีรีย์ — Sales Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0f1216; --card:#171b21; --card2:#1d222a; --line:#2a313b;
    --txt:#eef2f6; --mut:#9aa7b4; --brand:#ff6a2b; --brand2:#ffb03a;
    --ok:#2fbf71; --warn:#ffb03a; --bad:#ff5a5f; --accent:#3aa0ff;
    --radius:16px; --shadow:0 8px 30px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'Noto Sans Thai',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    background:radial-gradient(1200px 600px at 80% -10%,#22160c 0,transparent 60%),var(--bg);
    color:var(--txt); -webkit-font-smoothing:antialiased; min-height:100vh;
  }
  a{color:var(--accent)}
  .wrap{max-width:1160px;margin:0 auto;padding:16px}
  .hide{display:none!important}
  /* ---------- top bar ---------- */
  .topbar{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--line);
    position:sticky;top:0;z-index:20;background:rgba(15,18,22,.86);backdrop-filter:blur(8px)}
  .logo{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;font-size:20px;
    background:linear-gradient(135deg,var(--brand),var(--brand2));box-shadow:var(--shadow)}
  .brandttl{font-weight:800;line-height:1.05}
  .brandttl small{display:block;font-weight:500;color:var(--mut);font-size:11px}
  .spacer{flex:1}
  .whoami{font-size:13px;color:var(--mut);text-align:right}
  .whoami b{color:var(--txt)}
  .btn{border:0;cursor:pointer;border-radius:12px;padding:11px 16px;font:inherit;font-weight:700;
    background:var(--brand);color:#231000;transition:.15s;font-size:14px}
  .btn:hover{filter:brightness(1.08)}
  .btn.ghost{background:transparent;color:var(--txt);border:1px solid var(--line)}
  .btn.sm{padding:8px 12px;font-size:13px}
  .btn.wide{width:100%}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  /* ---------- banners ---------- */
  .banner{margin:14px 0;padding:12px 14px;border-radius:12px;font-size:13px;font-weight:600;
    border:1px solid var(--line);display:flex;gap:10px;align-items:center}
  .banner.demo{background:#1e1a0e;border-color:#4a3c15;color:var(--brand2)}
  .banner.live{background:#0e1c14;border-color:#1e4632;color:var(--ok)}
  /* ---------- login ---------- */
  .login-shell{min-height:100vh;display:grid;place-items:center;padding:20px}
  .login-card{width:100%;max-width:420px;background:var(--card);border:1px solid var(--line);
    border-radius:22px;padding:26px;box-shadow:var(--shadow)}
  .login-card h1{margin:14px 0 2px;font-size:22px}
  .login-card .sub{color:var(--mut);font-size:13px;margin-bottom:18px}
  .seg{display:flex;background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:4px;margin-bottom:18px}
  .seg button{flex:1;border:0;background:transparent;color:var(--mut);padding:10px;border-radius:9px;
    font:inherit;font-weight:700;cursor:pointer;font-size:14px}
  .seg button.on{background:var(--brand);color:#231000}
  label.fld{display:block;margin-bottom:14px}
  label.fld span{display:block;font-size:12px;color:var(--mut);margin-bottom:6px;font-weight:600}
  input,select{width:100%;padding:13px 14px;border-radius:12px;border:1px solid var(--line);
    background:var(--card2);color:var(--txt);font:inherit;font-size:15px;outline:none}
  input:focus,select:focus{border-color:var(--brand)}
  .err{color:var(--bad);font-size:13px;font-weight:600;min-height:18px;margin:2px 0 8px}
  .hint{font-size:11.5px;color:var(--mut);margin-top:12px;line-height:1.5;text-align:center}
  /* ---------- kpi ---------- */
  .grid{display:grid;gap:12px}
  .kpis{grid-template-columns:repeat(6,1fr);margin:16px 0}
  @media(max-width:900px){.kpis{grid-template-columns:repeat(3,1fr)}}
  @media(max-width:520px){.kpis{grid-template-columns:repeat(2,1fr)}}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px}
  .kpi .k{font-size:11.5px;color:var(--mut);font-weight:600;letter-spacing:.2px}
  .kpi .v{font-size:23px;font-weight:800;margin-top:4px;line-height:1.05}
  .kpi .v small{font-size:13px;color:var(--mut);font-weight:600}
  .kpi.hl{background:linear-gradient(135deg,#241203,#1a1206);border-color:#4a3616}
  .kpi.hl .v{color:var(--brand2)}
  /* ---------- progress ---------- */
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin:12px 0}
  .card h2{margin:0 0 4px;font-size:16px}
  .card .cap{color:var(--mut);font-size:12.5px;margin:0 0 14px}
  .prog{height:16px;border-radius:10px;background:var(--card2);overflow:hidden;border:1px solid var(--line)}
  .prog>span{display:block;height:100%;background:linear-gradient(90deg,var(--brand),var(--brand2));width:0;transition:width .6s}
  .prog-legend{display:flex;justify-content:space-between;font-size:12px;color:var(--mut);margin-top:8px}
  .pace{position:relative}
  .pace .marker{position:absolute;top:-4px;width:2px;height:24px;background:var(--accent)}
  .pace .marker::after{content:'pace';position:absolute;top:-16px;left:-11px;font-size:9px;color:var(--accent)}
  /* ---------- table ---------- */
  .tablewrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table{width:100%;border-collapse:collapse;font-size:13.5px;min-width:640px}
  th,td{padding:10px 12px;text-align:right;border-bottom:1px solid var(--line);white-space:nowrap}
  th:first-child,td:first-child{text-align:left;position:sticky;left:0;background:var(--card)}
  th{color:var(--mut);font-weight:600;cursor:pointer;user-select:none;font-size:12px}
  th.no{cursor:default}
  tbody tr:hover td{background:var(--card2)}
  tbody tr:hover td:first-child{background:var(--card2)}
  td.big{font-weight:800}
  .pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}
  .pill.g{background:#123023;color:#54d68b}
  .pill.y{background:#332811;color:var(--brand2)}
  .pill.r{background:#3a1516;color:#ff8a8e}
  .muted{color:var(--mut)}
  tfoot td{font-weight:800;border-top:2px solid var(--line);border-bottom:0}
  /* ---------- store input ---------- */
  .menu-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}
  .menu-row:last-child{border-bottom:0}
  .menu-ico{width:40px;height:40px;border-radius:11px;background:var(--card2);display:grid;place-items:center;font-size:20px;flex:none}
  .menu-name{flex:1;font-weight:600;font-size:14px}
  .menu-name small{display:block;color:var(--mut);font-weight:400;font-size:11px}
  .qty{display:flex;align-items:center;gap:8px}
  .qty button{width:38px;height:38px;border-radius:10px;border:1px solid var(--line);background:var(--card2);
    color:var(--txt);font-size:20px;cursor:pointer;font-weight:700}
  .qty input{width:64px;text-align:center;font-weight:800;font-size:17px;padding:9px 4px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:520px){.row2{grid-template-columns:1fr}}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);opacity:0;
    background:var(--ok);color:#04160c;padding:12px 20px;border-radius:12px;font-weight:700;box-shadow:var(--shadow);
    transition:.25s;z-index:50;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast.err{background:var(--bad);color:#fff}
  .subtabs{display:flex;gap:8px;margin:14px 0;flex-wrap:wrap}
  .subtabs button{border:1px solid var(--line);background:var(--card);color:var(--mut);padding:8px 14px;
    border-radius:20px;font:inherit;font-weight:700;cursor:pointer;font-size:13px}
  .subtabs button.on{background:var(--brand);color:#231000;border-color:var(--brand)}
  canvas{max-width:100%}
  .foot{color:var(--mut);font-size:11.5px;text-align:center;padding:24px 0}
  .badge{font-size:10px;background:var(--card2);border:1px solid var(--line);padding:2px 7px;border-radius:6px;color:var(--mut)}
</style>
</head>

<script>
/* =====================================================================
   Storage layer — Firebase if configured, else localStorage (demo)
   Data shape:  sales/{branchCode}/{YYYY-MM-DD} = {m1,m2,m3,by,ts}
   ===================================================================== */
const HAS_FB = !!(CONFIG.firebase && CONFIG.firebase.databaseURL && CONFIG.firebase.apiKey);
let db = null, salesCache = {}, changeListeners = [];

function fireChange(){ changeListeners.forEach(fn=>{try{fn(salesCache)}catch(e){}}); }
function onSalesChange(fn){ changeListeners.push(fn); fn(salesCache); }

async function initStorage(){
  if(HAS_FB){
    await loadScript("https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js");
    await loadScript("https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js");
    firebase.initializeApp(CONFIG.firebase);
    db = firebase.database();
    db.ref("sales").on("value", snap=>{ salesCache = snap.val() || {}; fireChange(); });
  }else{
    salesCache = JSON.parse(localStorage.getItem("isaan_sales")||"{}");
    // sync across tabs on same device
    window.addEventListener("storage", e=>{
      if(e.key==="isaan_sales"){ salesCache = JSON.parse(e.newValue||"{}"); fireChange(); }
    });
  }
  await maybeSeed();
}
// Load the 10 Jul opening-day data once, only if it was never seeded before.
async function maybeSeed(){
  if(!SEED || !SEED.length) return;
  if(HAS_FB){
    const snap = await db.ref("meta/seeded").once("value");
    if(snap.val()) return;
    const updates={};
    SEED.forEach(([code,m1,m2,m3])=>{ updates["sales/"+code+"/"+SEED_DATE]={m1,m2,m3,by:"seed",ts:SEED_TS}; });
    updates["meta/seeded"]=SEED_TS;
    await db.ref().update(updates);   // .on listener will refresh the UI
  }else{
    if(localStorage.getItem("isaan_seeded")) return;
    SEED.forEach(([code,m1,m2,m3])=>{ salesCache[code]=salesCache[code]||{}; salesCache[code][SEED_DATE]={m1,m2,m3,by:"seed",ts:SEED_TS}; });
    localStorage.setItem("isaan_sales",JSON.stringify(salesCache));
    localStorage.setItem("isaan_seeded",String(SEED_TS));
    fireChange();
  }
}
async function saveEntry(code,date,rec){
  // Build an audit-log record BEFORE overwriting, capturing the previous total.
  const existing=(salesCache[code]||{})[date];
  const prevTotal=existing?((+existing.m1||0)+(+existing.m2||0)+(+existing.m3||0)):null;
  const total=(+rec.m1||0)+(+rec.m2||0)+(+rec.m3||0);
  const logRec={code,date,byName:rec.byName||"",m1:+rec.m1||0,m2:+rec.m2||0,m3:+rec.m3||0,total,prevTotal,edit:!!existing,ts:rec.ts};
  if(HAS_FB){
    await db.ref("sales/"+code+"/"+date).set(rec);
    db.ref("logs").push(logRec).catch(e=>console.warn("audit log skipped:",e.message)); // best-effort, never blocks the save
  }else{
    salesCache[code]=salesCache[code]||{};
    salesCache[code][date]=rec;
    localStorage.setItem("isaan_sales",JSON.stringify(salesCache));
    const logs=JSON.parse(localStorage.getItem("isaan_logs")||"[]");
    logs.push(logRec);
    localStorage.setItem("isaan_logs",JSON.stringify(logs));
    fireChange();
  }
}
// Manager audit log — live list of every save (append-only).
let logsCache=[];
function onLogsChange(cb){
  if(HAS_FB){
    db.ref("logs").limitToLast(1000).on("value",snap=>{
      const v=snap.val()||{}; logsCache=Object.keys(v).map(k=>v[k]); cb(logsCache);
    });
  }else{
    logsCache=JSON.parse(localStorage.getItem("isaan_logs")||"[]"); cb(logsCache);
    window.addEventListener("storage",e=>{ if(e.key==="isaan_logs"){ logsCache=JSON.parse(e.newValue||"[]"); cb(logsCache); }});
  }
}
async function deleteEntry(code,date){
  if(HAS_FB){ await db.ref("sales/"+code+"/"+date).remove(); }
  else{
    if(salesCache[code]) delete salesCache[code][date];
    localStorage.setItem("isaan_sales",JSON.stringify(salesCache));
    fireChange();
  }
}
function loadScript(src){return new Promise((res,rej)=>{const s=document.createElement("script");s.src=src;s.onload=res;s.onerror=rej;document.head.appendChild(s);});}
</script>

<script>
/* =====================================================================
   Helpers
   ===================================================================== */
const $ = s=>document.querySelector(s);
const fmt = n=>Math.round(n).toLocaleString("en-US");
const MENUS = CONFIG.menus;
const START = new Date(CONFIG.startDate+"T00:00:00");   // date-only midnight
const END   = new Date(CONFIG.endDate+"T00:00:00");     // date-only midnight

function todayStr(){ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function todayMid(){ return new Date(todayStr()+"T00:00:00"); }
function totalDays(){ return Math.round((END-START)/864e5)+1; }                 // inclusive of both ends
function daysElapsed(){ const t=todayMid(); if(t<START)return 0; return Math.min(totalDays(),Math.round((Math.min(t,END)-START)/864e5)+1); }
function daysLeft(){ const t=todayMid(); if(t>END)return 0; if(t<START)return totalDays(); return Math.round((END-t)/864e5)+1; } // includes today
function clampDate(s){ return s<CONFIG.startDate?CONFIG.startDate:(s>CONFIG.endDate?CONFIG.endDate:s); }
function branchByCode(c){ return CONFIG.branches.find(b=>b.code===c); }

// aggregate all sales -> {byBranch:{code:{m1,m2,m3,total,inc,last}}, grand:{...}, byDate:{date:total}}
function aggregate(cache){
  const byBranch={}, byDate={}; let g={m1:0,m2:0,m3:0,total:0};
  CONFIG.branches.forEach(b=>byBranch[b.code]={m1:0,m2:0,m3:0,total:0,inc:0,last:0,lastBy:"",entries:0});
  Object.keys(cache||{}).forEach(code=>{
    const bb=byBranch[code]; if(!bb)return;
    Object.keys(cache[code]||{}).forEach(date=>{
      const r=cache[code][date]||{}; const m1=+r.m1||0,m2=+r.m2||0,m3=+r.m3||0,t=m1+m2+m3;
      bb.m1+=m1;bb.m2+=m2;bb.m3+=m3;bb.total+=t;bb.entries++;
      if(r.ts&&r.ts>bb.last){ bb.last=r.ts; bb.lastBy=r.byName||""; }
      g.m1+=m1;g.m2+=m2;g.m3+=m3;g.total+=t;
      byDate[date]=(byDate[date]||0)+t;
    });
    bb.inc=bb.total*CONFIG.incentive;
  });
  g.inc=g.total*CONFIG.incentive;
  return {byBranch,byDate,grand:g};
}

function toast(msg,isErr){ const t=$("#toast"); t.textContent=msg; t.className="toast show"+(isErr?" err":""); setTimeout(()=>t.className="toast",2200); }
function relTime(ts){ if(!ts)return "—"; const s=(Date.now()-ts)/1000; if(s<60)return "เมื่อสักครู่"; if(s<3600)return Math.floor(s/60)+" นาทีที่แล้ว"; if(s<86400)return Math.floor(s/3600)+" ชม.ที่แล้ว"; return Math.floor(s/86400)+" วันที่แล้ว"; }
</script>

<script>

   ===================================================================== */
let session = null; // {role:'store'|'mgr', code, name}
let loginMode = "store";

function setLoginMode(m){
  loginMode=m;

}
function fillBranchSelect(){
  const sel=$("#branchSel");
  sel.innerHTML=CONFIG.branches.map(b=>`<option value="${b.code}">${b.code} · ${b.name}</option>`).join("");
}
function doLogin(){
  const err=$("#loginErr"); err.textContent="";
  if(loginMode==="store"){
    const code=$("#branchSel").value, pin=$("#branchPin").value.trim();
    const staff=$("#staffName").value.trim();
    const b=branchByCode(code);
    if(!staff){ err.textContent="กรุณาใส่ชื่อผู้บันทึก"; return; }

    localStorage.setItem("isaan_staffname",staff);
    session={role:"store",code:b.code,name:b.name,staff:staff};
  }else{
    const u=$("#mgrUser").value.trim(), p=$("#mgrPass").value.trim();
    if(u!==CONFIG.manager.user || p!==CONFIG.manager.pass){ err.textContent="ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง"; return; }
    session={role:"mgr",name:"ทีมผู้บริหาร"};
  }
  sessionStorage.setItem("isaan_session",JSON.stringify(session));
  enterApp();
}
function logout(){ sessionStorage.removeItem("isaan_session"); location.reload(); }

function enterApp(){

  $("#connBanner").innerHTML = HAS_FB

    : `<div class="banner demo">🟡 โหมดทดลอง — ข้อมูลบันทึกในเครื่องนี้เท่านั้น (ยังไม่ได้ตั้งค่า Firebase). ดูวิธีเปิดการซิงก์ใน README.md</div>`;
  if(session.role==="store"){

<script>
/* =====================================================================
   STORE VIEW
   ===================================================================== */
let storeTab="entry";
function renderStore(){
  const area=$("#storeArea");
  area.innerHTML=`
    <div class="grid kpis" id="storeKpis"></div>
    <div class="subtabs">
      <button id="tabEntry" class="on" onclick="switchStoreTab('entry')">✍️ บันทึกยอดขาย</button>

  `;

}
function switchStoreTab(t){

  $("#tabEntry").classList.toggle("on",t==="entry");
  $("#tabHist").classList.toggle("on",t==="hist");
  if(t==="entry")renderEntryForm(); else renderHistory();
}
function renderStoreKpis(){
  const ag=aggregate(salesCache); const me=ag.byBranch[session.code];
  const share=ag.grand.total?me.total/ag.grand.total*100:0;
  $("#storeKpis").innerHTML=`
    ${kpi("ยอดขายสะสมของสาขา",fmt(me.total)+' <small>จาน</small>')}
    ${kpi("อินเซนทีฟสะสม",'฿'+fmt(me.inc),'hl')}

    ${kpi("ยอดรวมทุกสาขา",fmt(ag.grand.total)+' <small>/ '+fmt(CONFIG.target)+'</small>')}

    ${kpi("วันที่บันทึกแล้ว",me.entries+' <small>วัน</small>')}
  `;
}
function kpi(k,v,cls){ return `<div class="kpi ${cls||''}"><div class="k">${k}</div><div class="v">${v}</div></div>`; }

let entryDate=clampDate(todayStr());   // default = today, but kept inside the promo window
function renderEntryForm(){
  const rec=(salesCache[session.code]||{})[entryDate]||{};
  const body=$("#storeBody");
  body.innerHTML=`
    <div class="card">
      <h2>บันทึกยอดขาย</h2>
      <p class="cap">เลือกวันที่ แล้วกรอกจำนวนจานที่ขายได้ของแต่ละเมนู · ฿${CONFIG.incentive}/จาน</p>
      <label class="fld" style="max-width:240px"><span>วันที่</span>
        <input id="entryDateInp" type="date" value="${entryDate}" min="${CONFIG.startDate}" max="${CONFIG.endDate}"></label>
      <div id="menuRows"></div>
      <div class="row2" style="margin-top:14px">
        <div class="kpi"><div class="k">รวมวันนี้</div><div class="v" id="entryTotal">0 <small>จาน</small></div></div>
        <div class="kpi hl"><div class="k">อินเซนทีฟวันนี้</div><div class="v" id="entryInc">฿0</div></div>
      </div>
      <button class="btn wide" style="margin-top:14px" onclick="submitEntry()">💾 บันทึกยอดขายวันที่ ${entryDate}</button>
    </div>`;
  $("#entryDateInp").addEventListener("change",e=>{ entryDate=e.target.value; renderEntryForm(); });
  const rows=$("#menuRows");
  rows.innerHTML=MENUS.map(m=>`
    <div class="menu-row">
      <div class="menu-ico">${m.ico}</div>
      <div class="menu-name">${m.name}<small>${m.en}</small></div>
      <div class="qty">
        <button onclick="bump('${m.id}',-1)">−</button>
        <input id="q_${m.id}" type="number" min="0" inputmode="numeric" value="${+rec[m.id]||0}" oninput="recalcEntry()">
        <button onclick="bump('${m.id}',1)">+</button>
      </div>
    </div>`).join("");
  recalcEntry();
}
function bump(id,d){ const el=$("#q_"+id); el.value=Math.max(0,(+el.value||0)+d); recalcEntry(); }
function recalcEntry(){
  let t=0; MENUS.forEach(m=>t+=Math.max(0,+$("#q_"+m.id).value||0));
  $("#entryTotal").innerHTML=fmt(t)+' <small>จาน</small>';
  $("#entryInc").textContent='฿'+fmt(t*CONFIG.incentive);
}
async function submitEntry(){
  const rec={by:session.code,byName:session.staff||"",ts:Date.now()}; let t=0;
  MENUS.forEach(m=>{ const v=Math.max(0,+$("#q_"+m.id).value||0); rec[m.id]=v; t+=v; });
  try{
    await saveEntry(session.code,entryDate,rec);
    toast("บันทึกแล้ว ✓ "+fmt(t)+" จาน · ฿"+fmt(t*CONFIG.incentive));
  }catch(e){ toast("บันทึกไม่สำเร็จ: "+e.message,true); }
}
function renderHistory(){
  const data=salesCache[session.code]||{};
  const dates=Object.keys(data).sort().reverse();
  const body=$("#storeBody");
  if(!dates.length){ body.innerHTML=`<div class="card"><p class="cap" style="margin:0">ยังไม่มีข้อมูล — ไปที่แท็บ “บันทึกยอดขาย” เพื่อเริ่มบันทึก</p></div>`; return; }
  let sum=0;
  const rows=dates.map(d=>{
    const r=data[d]; const t=(+r.m1||0)+(+r.m2||0)+(+r.m3||0); sum+=t;
    return `<tr>
      <td>${d}</td>
      <td>${fmt(+r.m1||0)}</td><td>${fmt(+r.m2||0)}</td><td>${fmt(+r.m3||0)}</td>
      <td class="big">${fmt(t)}</td><td>฿${fmt(t*CONFIG.incentive)}</td>
      <td class="muted">${r.byName||'—'}</td>
      <td><button class="btn ghost sm" onclick="editDate('${d}')">แก้ไข</button></td>
    </tr>`;
  }).join("");
  body.innerHTML=`
    <div class="card">
      <h2>ประวัติการบันทึกของ ${session.name}</h2>
      <p class="cap">${dates.length} วัน · รวม ${fmt(sum)} จาน · อินเซนทีฟ ฿${fmt(sum*CONFIG.incentive)}</p>
      <div class="tablewrap"><table>
        <thead><tr><th class="no">วันที่</th><th class="no">${MENUS[0].ico}</th><th class="no">${MENUS[1].ico}</th><th class="no">${MENUS[2].ico}</th><th class="no">รวม</th><th class="no">อินเซนทีฟ</th><th class="no">ผู้บันทึก</th><th class="no"></th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
    </div>`;
}
function editDate(d){ entryDate=d; switchStoreTab("entry"); $("#tabEntry").classList.add("on"); }
</script>

<script>
/* =====================================================================
   MANAGER VIEW
   ===================================================================== */
let sortKey="total", sortDir=-1, barChart=null, lineChart=null;
function renderManager(){
  $("#mgrArea").innerHTML=`
    <div class="grid kpis" id="mgrKpis"></div>
    <div class="card">
      <h2>ความคืบหน้าสู่เป้าหมาย 25,806 จาน</h2>
      <p class="cap" id="progCap"></p>
      <div class="prog"><span id="progBar"></span></div>
      <div class="prog-legend"><span id="progL"></span><span id="progR"></span></div>
    </div>
    <div class="card">
      <h2>ยอดขายรายสาขา</h2><p class="cap">จำนวนจานสะสม · เรียงจากมากไปน้อย</p>
      <div style="position:relative;height:660px"><canvas id="barChart"></canvas></div>
    </div>
    <div class="card">
      <h2>ยอดสะสมเทียบเป้า (Pace)</h2><p class="cap">เส้นส้ม = ยอดจริงสะสม · เส้นประ = เป้าที่ควรถึง</p>
      <div style="position:relative;height:300px"><canvas id="lineChart"></canvas></div>
    </div>
    <div class="card">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <h2 style="margin:0">ตารางรายสาขา (24 สาขา)</h2>
        <span class="spacer"></span>
        <button class="btn ghost sm" onclick="exportCSV()">⬇︎ ดาวน์โหลด CSV</button>
      </div>
      <p class="cap">คลิกหัวคอลัมน์เพื่อเรียงลำดับ</p>
      <div class="tablewrap"><table id="mgrTable"></table></div>
    </div>
    <div class="card">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <h2 style="margin:0">📝 ประวัติการแก้ไขข้อมูล (Audit Log)</h2>
        <span class="spacer"></span>
        <button class="btn ghost sm" onclick="exportLogCSV()">⬇︎ CSV</button>
      </div>
      <p class="cap">บันทึกทุกครั้งที่มีการกรอก/แก้ไข — ใครสาขาไหน แก้ยอดวันไหน เป็นเท่าไร เมื่อไหร่ · ลบไม่ได้ · ล่าสุดอยู่บนสุด</p>
      <div class="tablewrap" style="max-height:460px;overflow-y:auto"><table id="logTable"></table></div>
    </div>`;
  onSalesChange(()=>renderMgrData());
  onLogsChange(()=>renderLog());
}
function renderLog(){
  const el=$("#logTable"); if(!el)return;
  const rows=[...logsCache].sort((a,b)=>(b.ts||0)-(a.ts||0)).slice(0,300);
  const head=`<thead><tr>
    <th class="no">เวลาที่บันทึก</th><th class="no">ผู้บันทึก</th><th class="no">สาขา</th><th class="no">ยอดของวันที่</th>
    <th class="no">${MENUS[0].ico}</th><th class="no">${MENUS[1].ico}</th><th class="no">${MENUS[2].ico}</th>
    <th class="no">รวม</th><th class="no">สถานะ</th>
  </tr></thead>`;
  if(!rows.length){ el.innerHTML=head+`<tbody><tr><td colspan="9" class="muted">ยังไม่มีการบันทึก</td></tr></tbody>`; return; }
  const body=rows.map(r=>{
    const b=branchByCode(r.code); const nm=b?(r.code+" · "+b.name):r.code;
    const when=r.ts?new Date(r.ts).toLocaleString("th-TH",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"}):"—";
    const status=r.edit
      ? `<span class="pill y">แก้ไข ${fmt(r.prevTotal||0)}→${fmt(r.total)}</span>`
      : `<span class="pill g">บันทึกใหม่</span>`;
    return `<tr>
      <td>${when}</td><td>${r.byName?r.byName:'<span class="muted">—</span>'}</td><td>${nm}</td><td class="muted">${r.date}</td>
      <td>${fmt(r.m1)}</td><td>${fmt(r.m2)}</td><td>${fmt(r.m3)}</td>
      <td class="big">${fmt(r.total)}</td><td>${status}</td>
    </tr>`;
  }).join("");
  el.innerHTML=head+"<tbody>"+body+"</tbody>";
}
function exportLogCSV(){
  let csv="เวลาที่บันทึก,ผู้บันทึก,รหัสสาขา,สาขา,ยอดของวันที่,"+MENUS.map(m=>m.name).join(",")+",รวม,สถานะ,ยอดเดิม\n";
  [...logsCache].sort((a,b)=>(b.ts||0)-(a.ts||0)).forEach(r=>{
    const b=branchByCode(r.code); const nm=b?b.name:"";
    const when=r.ts?new Date(r.ts).toLocaleString("th-TH"):"";
    csv+=['"'+when+'"','"'+(r.byName||"")+'"',r.code,'"'+nm+'"',r.date,r.m1,r.m2,r.m3,r.total,(r.edit?"แก้ไข":"ใหม่"),(r.prevTotal==null?"":r.prevTotal)].join(",")+"\n";
  });
  const blob=new Blob(["﻿"+csv],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download="isaan_auditlog_"+todayStr()+".csv"; a.click();
}
function renderMgrData(){
  const ag=aggregate(salesCache), g=ag.grand;
  const pct=CONFIG.target?g.total/CONFIG.target*100:0;
  const dl=daysLeft(), rem=Math.max(0,CONFIG.target-g.total);
  const reqDay=dl>0?rem/dl:rem;
  const elapsed=daysElapsed(), tot=totalDays();
  const pacePct=tot?elapsed/tot*100:0;
  const onPace=pct>=pacePct;
  $("#mgrKpis").innerHTML=`
    ${kpi("วันเหลือ",dl+' <small>/ '+tot+' วัน</small>')}
    ${kpi("ยอดขายรวม",fmt(g.total)+' <small>จาน</small>')}
    ${kpi("คงเหลือถึงเป้า",fmt(rem)+' <small>จาน</small>')}
    ${kpi("% ของเป้า",pct.toFixed(1)+'<small>%</small>',onPace?'':'')}
    ${kpi("ต้องขาย/วัน",fmt(reqDay)+' <small>จาน</small>')}
    ${kpi("อินเซนทีฟสะสม",'฿'+fmt(g.inc),'hl')}
  `;
  $("#progBar").style.width=Math.min(100,pct)+"%";
  $("#progCap").innerHTML=`ขายแล้ว <b>${fmt(g.total)}</b> จาน · ควรถึง <b>${fmt(CONFIG.target*pacePct/100)}</b> จานตามกำหนดเวลา (${pacePct.toFixed(0)}% ของช่วงเวลา) → <span class="pill ${onPace?'g':'r'}">${onPace?'ตามเป้า/เกินเป้า':'ต่ำกว่าเป้า '+ (pacePct-pct).toFixed(1)+'%'}</span>`;
  $("#progL").textContent="0";
  $("#progR").textContent=fmt(CONFIG.target)+" จาน (100%)";
  renderTable(ag); renderCharts(ag);
}
function renderTable(ag){
  const rows=CONFIG.branches.map(b=>({...b,...ag.byBranch[b.code]}));
  rows.sort((a,b)=> sortDir*((a[sortKey]>b[sortKey])?1:(a[sortKey]<b[sortKey])?-1:0));
  const g=ag.grand;
  const head=`<thead><tr>
    <th onclick="sortBy('name')">สาขา</th>
    <th onclick="sortBy('m1')">${MENUS[0].ico} สเต๊ก</th>
    <th onclick="sortBy('m2')">${MENUS[1].ico} ข้าวยำ</th>
    <th onclick="sortBy('m3')">${MENUS[2].ico} น้ำตก</th>
    <th onclick="sortBy('total')">รวม ▾</th>
    <th onclick="sortBy('total')">% แชร์</th>
    <th onclick="sortBy('inc')">อินเซนทีฟ</th>
    <th onclick="sortBy('last')">อัปเดตล่าสุด</th>
  </tr></thead>`;
  const body=rows.map(r=>{
    const share=g.total?r.total/g.total*100:0;
    return `<tr>
      <td>${r.code} · ${r.name}</td>
      <td>${fmt(r.m1)}</td><td>${fmt(r.m2)}</td><td>${fmt(r.m3)}</td>
      <td class="big">${fmt(r.total)}</td>
      <td class="muted">${share.toFixed(1)}%</td>
      <td>฿${fmt(r.inc)}</td>
      <td class="muted">${relTime(r.last)}${r.lastBy?'<br><span style="font-size:11px;color:#c7d0da">'+r.lastBy+'</span>':''}</td>
    </tr>`;
  }).join("");
  const foot=`<tfoot><tr>
    <td>รวมทั้งหมด</td><td>${fmt(g.m1)}</td><td>${fmt(g.m2)}</td><td>${fmt(g.m3)}</td>
    <td>${fmt(g.total)}</td><td>100%</td><td>฿${fmt(g.inc)}</td><td></td>
  </tr></tfoot>`;
  $("#mgrTable").innerHTML=head+"<tbody>"+body+"</tbody>"+foot;
}
function sortBy(k){ if(sortKey===k)sortDir*=-1; else{sortKey=k;sortDir=(k==="name")?1:-1;} renderMgrData(); }

async function ensureChart(){ if(!window.Chart) await loadScript("https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"); }
async function renderCharts(ag){
  await ensureChart();
  const gcol="#9aa7b4";
  Chart.defaults.color=gcol; Chart.defaults.font.family="'Noto Sans Thai',sans-serif";
  // bar
  const rows=CONFIG.branches.map(b=>({code:b.code,name:b.name,total:ag.byBranch[b.code].total}))
    .sort((a,b)=>b.total-a.total);
  const bctx=$("#barChart");
  if(barChart)barChart.destroy();
  const maxTotal=Math.max(1,...rows.map(r=>r.total));
  const barValue={id:"barValue",afterDatasetsDraw(c){
    const ctx=c.ctx; ctx.save();
    ctx.font="700 11px 'Noto Sans Thai',sans-serif"; ctx.fillStyle="#eef2f6"; ctx.textBaseline="middle";
    c.getDatasetMeta(0).data.forEach((bar,i)=>{ const v=rows[i].total; if(v>0) ctx.fillText(fmt(v),bar.x+6,bar.y); });
    ctx.restore();
  }};
  barChart=new Chart(bctx,{type:"bar",data:{labels:rows.map(r=>r.code+" · "+r.name),
    datasets:[{data:rows.map(r=>r.total),backgroundColor:"#ff6a2b",borderRadius:5,maxBarThickness:22}]},
    plugins:[barValue],
    options:{indexAxis:"y",maintainAspectRatio:false,layout:{padding:{right:38}},
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>" "+fmt(c.parsed.x)+" จาน"}}},
      scales:{
        x:{beginAtZero:true,suggestedMax:maxTotal*1.08,grid:{color:"#2a313b"},ticks:{font:{size:11}}},
        y:{grid:{display:false},ticks:{autoSkip:false,font:{size:11.5},crossAlign:"far",padding:4}}
      }}});
  // line cumulative vs pace
  const dates=[]; let d=new Date(START); while(d<=END){ dates.push(todayFromDate(d)); d=new Date(d.getTime()+864e5); }
  let cum=0; const actual=dates.map(dt=>{ cum+=(ag.byDate[dt]||0); return (new Date(dt)<=new Date(todayStr()))?cum:null; });
  const ideal=dates.map((dt,i)=>Math.round(CONFIG.target*(i+1)/dates.length));
  const lctx=$("#lineChart");
  if(lineChart)lineChart.destroy();
  lineChart=new Chart(lctx,{type:"line",data:{labels:dates,datasets:[
    {label:"ยอดจริงสะสม",data:actual,borderColor:"#ff6a2b",backgroundColor:"rgba(255,106,43,.12)",fill:true,tension:.2,pointRadius:0,borderWidth:2,spanGaps:false},
    {label:"เป้าตามกำหนด",data:ideal,borderColor:"#3aa0ff",borderDash:[6,5],fill:false,pointRadius:0,borderWidth:1.5}
  ]},options:{maintainAspectRatio:false,plugins:{legend:{labels:{boxWidth:12,font:{size:11}}}},
    scales:{x:{grid:{display:false},ticks:{maxTicksLimit:6,font:{size:10}}},y:{grid:{color:"#2a313b"}}}}});
}
function todayFromDate(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }

function exportCSV(){
  const ag=aggregate(salesCache);
  let csv="รหัสสาขา,สาขา,"+MENUS.map(m=>m.name).join(",")+",รวม,อินเซนทีฟ(บาท),อัปเดตล่าสุด\n";
  CONFIG.branches.forEach(b=>{ const r=ag.byBranch[b.code];
    csv+=[b.code,'"'+b.name+'"',r.m1,r.m2,r.m3,r.total,r.inc,r.last?new Date(r.last).toLocaleString("th-TH"):""].join(",")+"\n"; });
  const g=ag.grand; csv+=["","รวมทั้งหมด",g.m1,g.m2,g.m3,g.total,g.inc,""].join(",")+"\n";
  const blob=new Blob(["﻿"+csv],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download="isaan_sales_"+todayStr()+".csv"; a.click();
}
